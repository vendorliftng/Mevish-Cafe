<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mevish POS | Staff Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-red: #E63946; --accent-gold: #D4AF37; --bg-cream: #FDFCFB; --text-dark: #1D1D1D; --text-light: #6C6C6C; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #F4F6F8; color: var(--text-dark); padding-bottom: 120px; }

        /* Cashier Header (Dark Mode for Staff) */
        header { position: sticky; top: 0; background: #1D1D1D; color: white; z-index: 100; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-mevish { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 20px; color: var(--primary-red); letter-spacing: -0.5px; }
        .logo-eatery { font-weight: 300; font-size: 18px; color: white; }
        
        .cashier-select { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 8px; font-size: 14px; outline: none; }

        /* Controls */
        .controls-container { position: sticky; top: 60px; background: #F4F6F8; z-index: 99; padding: 15px 20px; border-bottom: 1px solid #E1E4E8; }
        .filters { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; margin-bottom: 15px; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-chip { background: #E1E4E8; color: var(--text-dark); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
        .filter-chip.active { background: #1D1D1D; color: #FFF; }
        .search-bar { width: 100%; padding: 12px 16px; border: 1px solid #DDD; border-radius: 12px; font-size: 15px; background: #FFF; outline: none; }

        /* Menu */
        .menu-section { padding: 20px; }
        .menu-card { background: var(--card-bg); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #E1E4E8; border-left: 4px solid var(--accent-gold); }
        .item-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .item-price { color: var(--primary-red); font-weight: 700; font-size: 14px; }
        .add-btn { background: #F4F6F8; border: none; color: #1D1D1D; width: 40px; height: 40px; border-radius: 8px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .add-btn:active { background: #DDD; }

        /* Cart */
        .floating-cart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #1D1D1D; color: #FFF; border-radius: 12px; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; display: none; }
        .floating-cart.visible { display: flex; }
        .cart-info { font-weight: 700; font-size: 16px; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #FFF; width: 100%; border-radius: 20px 20px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; }
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 15px; }
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #F8F8F8; padding: 5px 15px; border-radius: 8px; }
        .qty-btn { background: none; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
        .cart-total-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 22px; margin: 20px 0; border-top: 2px dashed #DDD; padding-top: 20px;}

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 5px; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; padding: 14px; border: 1px solid #DDD; border-radius: 8px; font-size: 16px; background: #F9F9F9; }
        
        .submit-btn { width: 100%; background: #1D1D1D; color: #FFF; border: none; padding: 18px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-mevish">MEVISH</span><span class="logo-eatery"> POS</span>
        </div>
        <select class="cashier-select" id="cashier-name">
            <option value="Mary">Shift: Mary</option>
            <option value="John">Shift: John</option>
            <option value="Manager">Shift: Manager</option>
        </select>
    </header>

    <div class="controls-container">
        <div class="filters" id="filters">
            <button class="filter-chip active" onclick="filterMenu('All', this)">All</button>
            <button class="filter-chip" onclick="filterMenu('Foods', this)">Foods</button>
            <button class="filter-chip" onclick="filterMenu('Swallows', this)">Swallows</button>
            <button class="filter-chip" onclick="filterMenu('Pastries', this)">Pastries</button>
            <button class="filter-chip" onclick="filterMenu('Drinks', this)">Drinks</button>
        </div>
        <input type="text" class="search-bar" id="search-input" placeholder="🔍 Quick Search Menu..." oninput="handleSearch()">
    </div>

    <main class="menu-section" id="menu-container">
        <p style='text-align:center;'>Loading POS Menu...</p>
    </main>

    <div class="floating-cart" id="floating-cart" onclick="openCheckout()">
        <div class="cart-info"><span id="cart-count">0</span> Items | ₦<span id="cart-total-float">0</span></div>
        <div>Checkout ➔</div>
    </div>

    <div class="modal-overlay" id="checkout-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Walk-In Checkout</h2>
                <button class="close-btn" onclick="closeCheckout()">&times;</button>
            </div>
            <div id="cart-items-list"></div>
            <div class="cart-total-row"><span>Total Due:</span><span>₦<span id="cart-total-modal">0</span></span></div>
            
            <div class="input-group">
                <label>Customer/Order Name (For Receipt)</label>
                <input type="text" id="cust-name" placeholder="E.g., Walk-in 01" required>
            </div>
            
            <div class="input-group">
                <label>Payment Method</label>
                <select id="payment-method">
                    <option value="POS">Paid via POS</option>
                    <option value="Cash">Paid via Cash</option>
                    <option value="Transfer">Paid via Transfer</option>
                </select>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="processOrder()">Log Order as Paid</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEpm1qIgup5q6DBF4F9PEzQD3XEZv0Sqz0otqGdzrbXB079afSjD8P_lpZj1_xpMXy1A/exec"; 
        
        let menuData = []; 
        let cart = [];
        let currentCategory = "All";

        function init() { fetchMenuFromSheet(); }

        async function fetchMenuFromSheet() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                if (result.status === "success") { menuData = result.data; renderMenu(); }
            } catch (error) { document.getElementById('menu-container').innerHTML = "<p>Error loading menu.</p>"; }
        }

        function handleSearch() { renderMenu(); }
        function filterMenu(category, btnElement) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btnElement.classList.add('active'); currentCategory = category;
            document.getElementById('search-input').value = ""; renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';
            
            let filteredData = [...menuData];
            if (currentCategory !== 'All') filteredData = filteredData.filter(i => i.category === currentCategory);
            if (searchQuery !== "") filteredData = filteredData.filter(i => i.name.toLowerCase().includes(searchQuery));
            
            filteredData.forEach(item => {
                container.innerHTML += `
                    <div class="menu-card">
                        <div class="item-info"><h3>${item.name}</h3><div class="item-price">₦${parseInt(item.price).toLocaleString()}</div></div>
                        <button class="add-btn" onclick="addToCart(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price})">+</button>
                    </div>`;
            });
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty += 1; else cart.push({ id, name, price, qty: 1 });
            updateCartUI();
        }
        function increaseQty(id) { cart.find(i => i.id === id).qty += 1; updateCartUI(); openCheckout(); }
        function decreaseQty(id) {
            const index = cart.findIndex(i => i.id === id);
            if (index > -1) { cart[index].qty -= 1; if (cart[index].qty === 0) cart.splice(index, 1); }
            if (cart.length === 0) closeCheckout(); else { updateCartUI(); openCheckout(); }
        }
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cart-count').innerText = totalItems;
            document.getElementById('cart-total-float').innerText = totalPrice.toLocaleString();
            const cartElement = document.getElementById('floating-cart');
            if (totalItems > 0) cartElement.classList.add('visible'); else cartElement.classList.remove('visible');
        }

        function openCheckout() {
            const list = document.getElementById('cart-items-list'); list.innerHTML = ''; let total = 0;
            cart.forEach(item => {
                total += (item.price * item.qty);
                list.innerHTML += `
                    <div class="cart-item-row">
                        <div><div style="font-weight:600">${item.name}</div><div style="color:red; font-weight:700">₦${(item.price * item.qty).toLocaleString()}</div></div>
                        <div class="qty-controls"><button class="qty-btn" onclick="decreaseQty(${item.id})">-</button><span>${item.qty}</span><button class="qty-btn" onclick="increaseQty(${item.id})">+</button></div>
                    </div>`;
            });
            document.getElementById('cart-total-modal').innerText = total.toLocaleString();
            document.getElementById('checkout-modal').classList.add('active');
        }
        function closeCheckout() { document.getElementById('checkout-modal').classList.remove('active'); }

        async function processOrder() {
            const name = document.getElementById('cust-name').value;
            const cashierName = document.getElementById('cashier-name').value;
            const paymentMethod = document.getElementById('payment-method').value;
            const btn = document.getElementById('submit-btn');

            if (!name) { alert("Please enter an Order Name."); return; }
            btn.disabled = true; btn.innerText = "Saving to Database...";

            const orderId = "WLK-" + Math.floor(1000 + Math.random() * 9000); // WLK for Walk-in
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const orderDetailsStr = cart.map(i => `${i.qty}x ${i.name}`).join(" | ");
            
            // THE SECRET SAUCE: Constructing the payload for the Staff
            const payload = { 
                orderId: orderId, 
                customerName: name, 
                orderType: "Walk-in", 
                location: "Cashier: " + cashierName, // Tracks WHO processed it
                cartItems: orderDetailsStr, 
                totalPrice: totalPrice,
                status: "Paid - " + paymentMethod // Tracks HOW it was paid!
            };

            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                
                alert(`Success! ${orderId} logged successfully by ${cashierName}.`);
                
                // Reset everything for the next customer
                cart = []; 
                document.getElementById('cust-name').value = '';
                updateCartUI(); 
                closeCheckout();
                btn.disabled = false; btn.innerText = "Log Order as Paid";

            } catch (error) {
                alert("Database error. Please try again.");
                btn.disabled = false; btn.innerText = "Log Order as Paid";
            }
        }

        init();
    </script>
</body>
</html>
